services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID:-}
        VITE_EARLY_ACCESS: ${VITE_EARLY_ACCESS:-false}
        VITE_PAYMENTS_CLIENT_TOKEN: ${VITE_PAYMENTS_CLIENT_TOKEN:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      # Runtime (server routes / SSR) — not inlined at build
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STRIPE_SANDBOX_API_KEY: ${STRIPE_SANDBOX_API_KEY:-}
      STRIPE_LIVE_API_KEY: ${STRIPE_LIVE_API_KEY:-}
    restart: unless-stopped

  # Optional: hot-reload dev server
  dev:
    profiles: ["dev"]
    image: oven/bun:1.2
    working_dir: /app
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    ports:
      - "${DEV_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
    command: sh -c "bun install && bun run dev"
    stdin_open: true
    tty: true

volumes:
  dev_node_modules:
