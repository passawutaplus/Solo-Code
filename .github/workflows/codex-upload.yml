name: Apply Codex production hardening
on:
  push:
    branches: [codex-production-hardening]
permissions:
  contents: write
jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex-production-hardening
      - name: Apply reviewed files
        env:
          CODEX_PAYLOAD: ''
        run: |
          printf '%s' "$CODEX_PAYLOAD" | base64 -d > /tmp/codex-upload.zip
          unzip -o /tmp/codex-upload.zip -d . || true
          rm -f -- '.env.development'
          rm -f .github/workflows/codex-upload.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Apply Codex production hardening and shared backend'
          git push origin HEAD:codex-production-hardening
